<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Tracker</title>
<link rel="stylesheet" href="css/styles.css">


</head>
<body>

<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>

<main class="app">

    <!-- HOME -->

    <section id="homeView" class="view active">

        <div class="hero">
            <h1>Fitness Tracker</h1>
            <p>Select a friend</p>
        </div>

<section class="features-section">

    <h2 class="features-title">Features</h2>

    <div class="features-grid">

        <button
            class="feature-card feature-card--workouts"
            id="homeWorkoutsBtn"
            type="button"
        >
            <div class="feature-icon"></div>
            <h3>Home Workouts</h3>
            <p>Train without a gym</p>
        </button>

        <button
            class="feature-card feature-card--myths"
            id="fitnessMythsBtn"
            type="button"
        >
            <div class="feature-icon"></div>
            <h3>Fitness Myths</h3>
            <p>Learn fact from fiction</p>
        </button>


<button
    class="feature-card"
    id="selectFriendCard"
    type="button"
>
    <h3>Select Friend</h3>
    <p>View workout programs</p>
</button>

    </div>


</section>

    </section>

<!-- FRIENDS -->

<section id="friendsView" class="view">

    <div class="nav">
        <button id="friendsBackBtn">← Home</button>
    </div>

    <div id="friendGrid" class="friend-grid"></div>

</section>

    <!-- PROFILE -->

    <section id="profileView" class="view">

        <div class="nav">
            <button id="profileBackBtn">← Home</button>
        </div>

        <div id="profileContainer"></div>

        <div id="dayGrid" class="day-grid"></div>

    </section>

    <!-- WORKOUT -->

    <section id="workoutView" class="view">

        <div class="nav">
            <button id="workoutBackBtn">← Friend Profile</button>
        </div>

        <div id="workoutHeader"></div>

        <div id="exerciseContainer"></div>

    </section>

</main>

<script src="js/storage.js"></script>
<script src="js/progress.js"></script>
<script src="js/navigation.js"></script>
<script src="js/workout.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
